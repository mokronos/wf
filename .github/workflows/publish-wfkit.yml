name: Publish wfkit

on:
  push:
    tags:
      - "wfkit-v*"

# npm trusted publishing uses GitHub's OIDC token; no npm token is required.
# Configure @mokronos/wfkit with:
#   owner: mokronos
#   repository: wf
#   workflow: publish-wfkit.yml
permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-wfkit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Upgrade npm
        run: npm install --global npm@latest

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#wfkit-v}"
          PACKAGE_VERSION="$(jq -r .version packages/wf/package.json)"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match packages/wf/package.json version ($PACKAGE_VERSION)" >&2
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Publish
        run: npm publish
        working-directory: packages/wf
