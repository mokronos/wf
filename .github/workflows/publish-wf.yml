name: Publish wf CLI

on:
  push:
    tags:
      - "wf-v*"

# Configure npm trusted publishing for @mokronos/wf with this workflow.
permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-wf-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Upgrade npm
        run: npm install --global npm@latest

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#wf-v}"
          PACKAGE_VERSION="$(jq -r .version packages/wf-cli/package.json)"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match packages/wf-cli/package.json ($PACKAGE_VERSION)" >&2
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build platform packages
        run: bun run --cwd packages/wf-cli build --all

      - name: Publish platform binaries and wrapper
        run: bun run --cwd packages/wf-cli publish:built
